<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>First Shift</title>

  <!-- React + Babel via CDN (no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FFFBF5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animations ─────────────────────────── */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes slide-up {
      from { transform: translateY(110%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes bounce-in {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes star-pop {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.4) rotate(8deg); }
      100% { transform: scale(1)  rotate(0deg);  opacity: 1; }
    }
    @keyframes mic-glow {
      0%, 100% { box-shadow: 0 0 0 0   rgba(34,197,94,0.7); }
      50%       { box-shadow: 0 0 0 22px rgba(34,197,94,0); }
    }
    @keyframes wave-bar {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.6); }
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
    }
    @keyframes unlock-flash {
      0%, 100% { background: #FCD34D; }
      50%       { background: #F97316; }
    }
    @keyframes spin-in {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to   { transform: rotate(0deg)    scale(1); opacity: 1; }
    }

    /* ── Utility classes ────────────────────── */
    .slide-up  { animation: slide-up  0.38s cubic-bezier(.22,.68,0,1.3); }
    .bounce-in { animation: bounce-in 0.55s ease-out; }
    .spin-in   { animation: spin-in   0.5s ease-out; }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid #3B82F6;
      animation: pulse-ring 1.6s ease-out infinite;
    }

    .mic-glow { animation: mic-glow 1.4s ease-in-out infinite; }

    .wave-bar {
      width: 6px;
      border-radius: 4px;
      background: #3B82F6;
      animation: wave-bar 0.7s ease-in-out infinite;
    }

    /* ── Touch targets ──────────────────────── */
    button {
      min-height: 64px;
      min-width:  64px;
      cursor: pointer;
      border: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Confetti ───────────────────────────── */
    .confetti-piece {
      position: fixed;
      top: -12px;
      pointer-events: none;
      animation: confetti-fall linear forwards;
      z-index: 200;
    }

    /* ── Star animation delays ──────────────── */
    .star-1 { animation: star-pop 0.45s 0.1s ease-out both; }
    .star-2 { animation: star-pop 0.45s 0.3s ease-out both; }
    .star-3 { animation: star-pop 0.45s 0.5s ease-out both; }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- ═══════════════════════════════════════════════════════
       ALL APP CODE IN ONE <script type="text/babel"> TAG
       Babel CDN transpiles JSX on the fly in the browser
  ═══════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ──────────────────────────────────────────────────────
       SECTION A: 12 SCENARIO DATA
       4 worlds × 3 levels = 12 scenarios
    ────────────────────────────────────────────────────── */
    const WORLDS = [
      {
        id: 'pack',
        emoji: '📦',
        label: 'Pack',
        bg: '#DBEAFE',
        border: '#3B82F6',
        levels: [
          {
            name: 'First Day',
            character: { name: 'Dan', role: 'Supervisor', emoji: '👷', rate: 0.82, pitch: 0.95 },
            opening: "Good morning. Today you will pack boxes on line three. Watch me first.",
            targetPhrase: "Yes. I will watch you.",
            hint: '✅  👀',
            description: "First day on packaging line — supervisor gives instructions",
          },
          {
            name: 'Go Faster',
            character: { name: 'Maria', role: 'Line Lead', emoji: '👩‍🏭', rate: 0.88, pitch: 1.08 },
            opening: "The line is slow today. We need to go faster. Can you keep up?",
            targetPhrase: "Yes. I will try to go faster.",
            hint: '🏃  ⬆️',
            description: "Line lead asks you to pick up the pace",
          },
          {
            name: 'End of Shift',
            character: { name: 'Dan', role: 'Supervisor', emoji: '👷', rate: 0.82, pitch: 0.95 },
            opening: "Good work today. You did a great job. See you tomorrow.",
            targetPhrase: "Thank you. See you tomorrow.",
            hint: '🙏  👋',
            description: "Wrapping up your first shift",
          },
        ],
      },
      {
        id: 'line',
        emoji: '🏭',
        label: 'Line',
        bg: '#D1FAE5',
        border: '#22C55E',
        levels: [
          {
            name: 'New Machine',
            character: { name: 'Carlos', role: 'Trainer', emoji: '🧑‍🔧', rate: 0.82, pitch: 1.0 },
            opening: "This is the new sealing machine. Press the green button to start. Do you understand?",
            targetPhrase: "Yes. Press the green button to start.",
            hint: '🟢  🔘',
            description: "Learning to operate the sealing machine",
          },
          {
            name: 'Quality Check',
            character: { name: 'Sarah', role: 'Inspector', emoji: '👩‍💼', rate: 0.84, pitch: 1.05 },
            opening: "Stop. This box is not sealed right. We cannot send it out. Please redo it.",
            targetPhrase: "Sorry. I will redo it right now.",
            hint: '😔  🔁',
            description: "Quality inspector finds a problem with your work",
          },
          {
            name: 'Break Time',
            character: { name: 'Pat', role: 'Coworker', emoji: '🧑', rate: 0.88, pitch: 1.0 },
            opening: "Hey! It is break time. Come eat with us. Do you want coffee or tea?",
            targetPhrase: "Thank you. I want tea please.",
            hint: '🍵  🙏',
            description: "Coworker invites you to the break room",
          },
        ],
      },
      {
        id: 'safety',
        emoji: '⚠️',
        label: 'Safety',
        bg: '#FEF3C7',
        border: '#F59E0B',
        levels: [
          {
            name: 'Hard Hat',
            character: { name: 'Tom', role: 'Safety Officer', emoji: '🦺', rate: 0.78, pitch: 0.9 },
            opening: "Excuse me. You must wear your hard hat at all times on the floor. Do you have it?",
            targetPhrase: "Sorry. I will put it on right now.",
            hint: '⛑️  😔',
            description: "Safety officer reminds you about protective gear",
          },
          {
            name: 'Spill Alert',
            character: { name: 'Lisa', role: 'Safety Officer', emoji: '👩‍🦱', rate: 0.82, pitch: 1.0 },
            opening: "There is a spill on the floor near machine four. Please step back. It is slippery.",
            targetPhrase: "OK. I will step back. Thank you.",
            hint: '⬅️  🙏',
            description: "Responding quickly to a floor hazard",
          },
          {
            name: 'Fire Alarm',
            character: { name: 'Dan', role: 'Supervisor', emoji: '👷', rate: 0.78, pitch: 0.9 },
            opening: "Fire alarm! Everyone stop work and walk to the green exit sign. Do not run.",
            targetPhrase: "OK. I am walking to the exit now.",
            hint: '🚪  🚶',
            description: "Emergency evacuation — staying calm and safe",
          },
        ],
      },
      {
        id: 'team',
        emoji: '👥',
        label: 'Team',
        bg: '#F3E8FF',
        border: '#A855F7',
        levels: [
          {
            name: 'Meet the Team',
            character: { name: 'Lisa', role: 'Coworker', emoji: '👩', rate: 0.84, pitch: 1.05 },
            opening: "Hi! I am Lisa. I work on line two. What is your name?",
            targetPhrase: "Hello. My name is [your name]. Nice to meet you.",
            hint: '👋  😊',
            description: "Introducing yourself to a new coworker",
          },
          {
            name: 'Ask for Help',
            character: { name: 'Maria', role: 'Coworker', emoji: '👩‍🏭', rate: 0.86, pitch: 1.08 },
            opening: "Are you okay? You look confused. Do you need help with something?",
            targetPhrase: "Yes please. I do not understand this part.",
            hint: '🙋  ❓',
            description: "Asking a coworker for help without shame",
          },
          {
            name: 'End of Week',
            character: { name: 'Dan', role: 'Supervisor', emoji: '👷', rate: 0.82, pitch: 0.95 },
            opening: "Great week everyone. You all worked very hard. Have a good weekend!",
            targetPhrase: "Thank you. You too. Have a good weekend.",
            hint: '🙏  😊',
            description: "Friday goodbye — you made it through the week!",
          },
        ],
      },
    ];

    /* Hardcoded fallbacks if API fails — one per scenario (worldIdx*3 + levelIdx) */
    const FALLBACKS = [
      { encouragement: "Great try! You are learning fast.", better_phrase: "Yes. I will watch you.", bengali_translation: "হ্যাঁ। আমি আপনাকে দেখব।", star_count: 2 },
      { encouragement: "Good effort! Keep practicing.", better_phrase: "Yes. I will try to go faster.", bengali_translation: "হ্যাঁ। আমি দ্রুত যাওয়ার চেষ্টা করব।", star_count: 2 },
      { encouragement: "Well done! That was polite.", better_phrase: "Thank you. See you tomorrow.", bengali_translation: "ধন্যবাদ। আগামীকাল দেখা হবে।", star_count: 2 },
      { encouragement: "Great try! You understood well.", better_phrase: "Yes. Press the green button to start.", bengali_translation: "হ্যাঁ। শুরু করতে সবুজ বোতাম টিপুন।", star_count: 2 },
      { encouragement: "Good try! Mistakes help us learn.", better_phrase: "Sorry. I will redo it right now.", bengali_translation: "দুঃখিত। আমি এটি এখনই আবার করব।", star_count: 2 },
      { encouragement: "Nice! You are being friendly.", better_phrase: "Thank you. I want tea please.", bengali_translation: "ধন্যবাদ। আমি চা চাই দয়া করে।", star_count: 2 },
      { encouragement: "Great! Safety is very important.", better_phrase: "Sorry. I will put it on right now.", bengali_translation: "দুঃখিত। আমি এটি এখনই পরব।", star_count: 2 },
      { encouragement: "Perfect! You stayed calm and safe.", better_phrase: "OK. I will step back. Thank you.", bengali_translation: "ঠিক আছে। আমি পিছিয়ে যাব। ধন্যবাদ।", star_count: 2 },
      { encouragement: "Excellent! You followed instructions.", better_phrase: "OK. I am walking to the exit now.", bengali_translation: "ঠিক আছে। আমি এখন বের হওয়ার দরজায় হাঁটছি।", star_count: 2 },
      { encouragement: "Great! You introduced yourself well.", better_phrase: "Hello. My name is [your name]. Nice to meet you.", bengali_translation: "হ্যালো। আমার নাম [আপনার নাম]। আপনার সাথে দেখা করে ভালো লাগলো।", star_count: 2 },
      { encouragement: "Well done! Asking for help is brave.", better_phrase: "Yes please. I do not understand this part.", bengali_translation: "হ্যাঁ দয়া করে। আমি এই অংশটি বুঝতে পারছি না।", star_count: 2 },
      { encouragement: "Amazing! You finished the week strong.", better_phrase: "Thank you. You too. Have a good weekend.", bengali_translation: "ধন্যবাদ। আপনিও। ভালো সপ্তাহান্ত কাটান।", star_count: 2 },
    ];

    /* ──────────────────────────────────────────────────────
       SECTION B: HELPERS — TTS, SPEECH RECOGNITION, API
    ────────────────────────────────────────────────────── */

    /** Speak text aloud. onEnd fires when utterance finishes. */
    const speak = (text, { rate = 0.85, pitch = 1.0, lang = 'en-CA', onEnd } = {}) => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate  = rate;
      u.pitch = pitch;
      u.lang  = lang;
      if (onEnd) u.onend = onEnd;
      window.speechSynthesis.speak(u);
    };

    const stopSpeech = () => window.speechSynthesis.cancel();

    const getLevelFallbackIdx = (worldIdx, levelIdx) => worldIdx * 3 + levelIdx;

    /** Call Claude API. Returns parsed JSON body or throws. */
    const callClaude = async (apiKey, { system, userMsg, maxTokens = 200 }) => {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-client-side-allow': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: maxTokens,
          system,
          messages: [{ role: 'user', content: userMsg }],
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    };

    /* ──────────────────────────────────────────────────────
       SECTION C: CONFETTI COMPONENT
    ────────────────────────────────────────────────────── */
    const COLORS = ['#FF6B6B','#FCD34D','#22C55E','#3B82F6','#A855F7','#F97316','#EC4899'];
    const CONFETTI_PIECES = Array.from({ length: 45 }, (_, i) => ({
      id: i,
      color:    COLORS[i % COLORS.length],
      left:     (i * 7.3) % 100,
      delay:    (i * 0.07) % 2.2,
      duration: 2.2 + (i % 5) * 0.4,
      size:     8 + (i % 3) * 4,
      round:    i % 3 === 0,
    }));

    const Confetti = () => (
      <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 300 }}>
        {CONFETTI_PIECES.map(p => (
          <div
            key={p.id}
            className="confetti-piece"
            style={{
              left: `${p.left}%`,
              width: p.size, height: p.size,
              background: p.color,
              borderRadius: p.round ? '50%' : '2px',
              animationDelay: `${p.delay}s`,
              animationDuration: `${p.duration}s`,
            }}
          />
        ))}
      </div>
    );

    /* ──────────────────────────────────────────────────────
       SECTION D1: SETUP SCREEN
    ────────────────────────────────────────────────────── */
    const SetupScreen = ({ onSetup }) => {
      const [key, setKey] = useState('');
      const [focused, setFocused] = useState(false);

      useEffect(() => {
        speak("Welcome to First Shift. Please enter your Claude API key to begin.", { rate: 0.78 });
        return () => stopSpeech();
      }, []);

      return (
        <div style={{
          minHeight: '100vh', background: '#1E40AF',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          padding: 24, gap: 20,
        }}>
          <div style={{ fontSize: 80 }}>👷</div>
          <h1 style={{ color: 'white', fontSize: 34, fontWeight: 900, letterSpacing: -1, textAlign: 'center' }}>
            First Shift
          </h1>
          <p style={{ color: '#BFDBFE', fontSize: 16, textAlign: 'center', maxWidth: 280, lineHeight: 1.5 }}>
            Voice-first English for the Canadian workplace
          </p>

          <div style={{
            background: 'white', borderRadius: 22, padding: 24,
            width: '100%', maxWidth: 360,
            display: 'flex', flexDirection: 'column', gap: 14,
            boxShadow: '0 8px 32px rgba(0,0,0,0.18)',
          }}>
            <label style={{ fontSize: 13, color: '#6B7280', fontWeight: 700, letterSpacing: 0.5 }}>
              🔑  CLAUDE API KEY
            </label>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && key.trim() && onSetup(key.trim())}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              placeholder="sk-ant-api03-..."
              style={{
                fontSize: 16, padding: '14px 16px',
                borderRadius: 14,
                border: `2px solid ${focused ? '#3B82F6' : '#E5E7EB'}`,
                outline: 'none', width: '100%',
                transition: 'border-color 0.2s',
              }}
            />
            <button
              onClick={() => key.trim() && onSetup(key.trim())}
              style={{
                background: key.trim() ? '#22C55E' : '#D1FAE5',
                color: key.trim() ? 'white' : '#9CA3AF',
                fontSize: 20, fontWeight: 800,
                borderRadius: 16, padding: '18px 0',
                width: '100%', minHeight: 'unset',
                transition: 'all 0.2s',
              }}
            >
              ▶ &nbsp;Begin
            </button>
          </div>

          <p style={{ color: '#93C5FD', fontSize: 12, textAlign: 'center', maxWidth: 280, lineHeight: 1.5 }}>
            Your key is never saved. It stays in this browser tab only.
          </p>
        </div>
      );
    };

    /* ──────────────────────────────────────────────────────
       SECTION D2: WORLD SELECT SCREEN
    ────────────────────────────────────────────────────── */
    const WorldSelectScreen = ({ unlockedWorlds, completedLevels, onSelect }) => {
      useEffect(() => {
        speak("Hello. Tap a job to begin.", { rate: 0.8 });
        return () => stopSpeech();
      }, []);

      return (
        <div style={{ minHeight: '100vh', background: '#FFFBF5', display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div style={{
            background: '#1E40AF', padding: '18px 22px',
            display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <span style={{ fontSize: 28 }}>👷</span>
            <span style={{ color: 'white', fontSize: 22, fontWeight: 900, letterSpacing: -0.5 }}>First Shift</span>
          </div>

          <div style={{ flex: 1, padding: '20px 18px', display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* Big emoji prompt */}
            <div style={{ textAlign: 'center', padding: '6px 0', fontSize: 44 }}>🏭</div>

            {/* 2×2 grid of world cards */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              {WORLDS.map((world, i) => {
                const locked = !unlockedWorlds[i];
                const done  = completedLevels[i]?.size ?? 0;
                const total = world.levels.length;

                return (
                  <button
                    key={world.id}
                    onClick={() => !locked && onSelect(i)}
                    style={{
                      background: locked ? '#F3F4F6' : world.bg,
                      border: `3px solid ${locked ? '#D1D5DB' : world.border}`,
                      borderRadius: 22, padding: '18px 12px',
                      display: 'flex', flexDirection: 'column',
                      alignItems: 'center', gap: 10,
                      minHeight: 148,
                      opacity: locked ? 0.55 : 1,
                      cursor: locked ? 'not-allowed' : 'pointer',
                      transition: 'transform 0.12s',
                    }}
                    onMouseDown={e => !locked && (e.currentTarget.style.transform = 'scale(0.95)')}
                    onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
                    onTouchStart={e => !locked && (e.currentTarget.style.transform = 'scale(0.95)')}
                    onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
                  >
                    <span style={{ fontSize: 46 }}>{locked ? '🔒' : world.emoji}</span>
                    <span style={{ fontSize: 17, fontWeight: 800, color: locked ? '#9CA3AF' : '#1F2937' }}>
                      {world.label}
                    </span>
                    {!locked && (
                      <div style={{ width: '100%' }}>
                        {/* Progress bar */}
                        <div style={{ background: '#E5E7EB', borderRadius: 6, height: 7, overflow: 'hidden' }}>
                          <div style={{
                            background: world.border,
                            height: '100%',
                            width: `${(done / total) * 100}%`,
                            borderRadius: 6,
                            transition: 'width 0.6s ease',
                          }} />
                        </div>
                        <div style={{ textAlign: 'center', fontSize: 14, marginTop: 5 }}>
                          {'⭐'.repeat(done)}{'☆'.repeat(total - done)}
                        </div>
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    /* ──────────────────────────────────────────────────────
       SECTION D3: LEVEL SELECT SCREEN
    ────────────────────────────────────────────────────── */
    const LevelSelectScreen = ({ worldIdx, completedLevels, onSelect, onBack }) => {
      const world = WORLDS[worldIdx];

      useEffect(() => {
        speak(`${world.label} jobs. Choose a shift.`, { rate: 0.8 });
        return () => stopSpeech();
      }, []);

      return (
        <div style={{ minHeight: '100vh', background: '#FFFBF5', display: 'flex', flexDirection: 'column' }}>
          <div style={{
            background: '#1E40AF', padding: '18px 22px',
            display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <button
              onClick={onBack}
              style={{
                background: 'rgba(255,255,255,0.18)', color: 'white',
                borderRadius: 12, padding: '8px 14px',
                fontSize: 20, minHeight: 'unset', minWidth: 'unset',
              }}
            >←</button>
            <span style={{ fontSize: 28 }}>{world.emoji}</span>
            <span style={{ color: 'white', fontSize: 22, fontWeight: 900 }}>{world.label}</span>
          </div>

          <div style={{ flex: 1, padding: '20px 18px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            {world.levels.map((level, i) => {
              const done = completedLevels[worldIdx]?.has(i);
              return (
                <button
                  key={i}
                  onClick={() => onSelect(i)}
                  style={{
                    background: done ? '#DCFCE7' : 'white',
                    border: `3px solid ${done ? '#22C55E' : '#E5E7EB'}`,
                    borderRadius: 22, padding: '18px 20px',
                    display: 'flex', alignItems: 'center', gap: 16,
                    minHeight: 96, textAlign: 'left',
                    boxShadow: '0 2px 10px rgba(0,0,0,0.06)',
                    transition: 'transform 0.12s',
                  }}
                  onMouseDown={e => e.currentTarget.style.transform = 'scale(0.98)'}
                  onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
                  onTouchStart={e => e.currentTarget.style.transform = 'scale(0.98)'}
                  onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
                >
                  <span style={{ fontSize: 42, minWidth: 50 }}>
                    {done ? '⭐' : `${i + 1}️⃣`}
                  </span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: '#1F2937' }}>{level.name}</div>
                    <div style={{ fontSize: 13, color: '#6B7280', marginTop: 3, lineHeight: 1.4 }}>
                      {level.description}
                    </div>
                  </div>
                  <span style={{ fontSize: 30, color: '#D1D5DB' }}>{level.character.emoji}</span>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    /* ──────────────────────────────────────────────────────
       SECTION D4: CONVERSATION SCREEN
       Phase machine:
         char_speaking → ready_to_speak → recording
         → processing → coaching → coaching_replay → done
    ────────────────────────────────────────────────────── */
    const ConversationScreen = ({ worldIdx, levelIdx, apiKey, onComplete, onBack }) => {
      const world = WORLDS[worldIdx];
      const level = world.levels[levelIdx];
      const fbIdx = getLevelFallbackIdx(worldIdx, levelIdx);

      // phase state machine
      const [phase, setPhase] = useState('char_speaking');
      const [playerSpeech,  setPlayerSpeech]  = useState('');
      const [charResponse,  setCharResponse]  = useState('');
      const [coaching,      setCoaching]      = useState(null);
      const [stars,         setStars]         = useState(0);
      const [showTextInput, setShowTextInput] = useState(false);
      const [textInput,     setTextInput]     = useState('');
      const [apiError,      setApiError]      = useState('');

      const recRef = useRef(null);

      // On mount: play character opening line, then reveal mic
      useEffect(() => {
        speak(level.opening, {
          rate:  level.character.rate,
          pitch: level.character.pitch,
          onEnd: () => setPhase('ready_to_speak'),
        });
        return () => {
          stopSpeech();
          try { recRef.current?.stop(); } catch (_) {}
        };
      }, []);

      /* ── SPEECH RECOGNITION ── */
      const startRecording = useCallback(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setShowTextInput(true); return; }

        const r = new SR();
        r.continuous      = false;
        r.interimResults  = false;
        r.lang            = 'en-US';

        r.onresult = e => {
          const t = e.results[0][0].transcript;
          handlePlayerSpeech(t);
        };
        r.onerror = () => setShowTextInput(true);
        r.onend   = () => {};   // result fires before end, so no-op

        recRef.current = r;
        r.start();
        setPhase('recording');
      }, []);

      const stopRecording = useCallback(() => {
        try { recRef.current?.stop(); } catch (_) {}
      }, []);

      /* ── API CALLS ── */
      const handlePlayerSpeech = async (speech) => {
        setPlayerSpeech(speech);
        setPhase('processing');
        setApiError('');

        const coachSystem = `You are a friendly English coach for Rohingya refugee women learning Canadian workplace English.
Scenario: ${level.description}
Character (${level.character.name}, ${level.character.role}) said: "${level.opening}"
Ideal response: "${level.targetPhrase}"
Learner said: "${speech}"

Reply ONLY with valid JSON — no markdown, no extra text:
{
  "encouragement": "One short warm sentence (max 9 words)",
  "better_phrase": "The ideal simple English phrase (max 12 words)",
  "bengali_translation": "Bengali script translation of better_phrase",
  "star_count": 1
}
star_count rules: 3 = near-perfect match, 2 = understandable/partial, 1 = wrong but tried`;

        const charSystem = `You are ${level.character.name}, a ${level.character.role} at a Canadian packaging factory.
You are speaking with a new worker who is still learning English.
Your previous line: "${level.opening}"
The worker just said: "${speech}"
Reply with ONE warm, clear sentence (max 12 words). Very simple English. Stay professional and encouraging.`;

        try {
          const [coachRes, charRes] = await Promise.all([
            callClaude(apiKey, { system: coachSystem, userMsg: 'Give JSON feedback.', maxTokens: 300 }),
            callClaude(apiKey, { system: charSystem,  userMsg: speech,               maxTokens: 80  }),
          ]);

          // Parse coach JSON (strip markdown fences if model adds them)
          let coachObj;
          try {
            const raw = coachRes.content[0].text.trim()
              .replace(/^```json\s*/i, '').replace(/^```\s*/i, '')
              .replace(/```\s*$/g, '').trim();
            coachObj = JSON.parse(raw);
          } catch (_) {
            coachObj = FALLBACKS[fbIdx];
          }

          const charText = charRes.content?.[0]?.text?.trim() || "Good. Keep going.";

          setCharResponse(charText);
          setCoaching(coachObj);
          setStars(Math.min(3, Math.max(1, coachObj.star_count ?? 2)));
          setPhase('coaching');

        } catch (err) {
          setApiError(err.message);
          setCoaching(FALLBACKS[fbIdx]);
          setStars(FALLBACKS[fbIdx].star_count);
          setCharResponse("Good. Keep going.");
          setPhase('coaching');
        }
      };

      /* ── SAY IT WITH ME ── */
      const handleSayItWithMe = () => {
        if (!coaching) return;
        speak(coaching.better_phrase, {
          rate: 0.68,
          onEnd: () => setPhase('coaching_replay'),
        });
      };

      /* ── CONTINUE ── */
      const handleContinue = () => onComplete(stars);

      /* ── DERIVED FLAGS ── */
      const isCharSpeaking  = phase === 'char_speaking';
      const isReadyToSpeak  = phase === 'ready_to_speak';
      const isRecording     = phase === 'recording';
      const isProcessing    = phase === 'processing';
      const isCoaching      = phase === 'coaching';
      const isReplay        = phase === 'coaching_replay';
      const showCoachPanel  = isCoaching || isReplay;
      const showMicArea     = (isReadyToSpeak || isRecording) && !showTextInput;

      /* ── WAVE BARS (precomputed heights to avoid random on every render) ── */
      const WAVE_HEIGHTS = [22, 32, 44, 36, 24];
      const WAVE_DELAYS  = ['0s','0.12s','0.24s','0.36s','0.48s'];

      return (
        <div style={{ minHeight: '100vh', background: '#FFFBF5', display: 'flex', flexDirection: 'column' }}>
          {/* ── Header ── */}
          <div style={{
            background: '#1E40AF', padding: '16px 20px',
            display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <button
              onClick={onBack}
              style={{
                background: 'rgba(255,255,255,0.18)', color: 'white',
                borderRadius: 12, padding: '8px 14px',
                fontSize: 20, minHeight: 'unset', minWidth: 'unset',
              }}
            >←</button>
            <span style={{ fontSize: 22 }}>{world.emoji}</span>
            <div>
              <div style={{ color: 'white', fontWeight: 800, fontSize: 16 }}>{level.name}</div>
              <div style={{ color: '#BFDBFE', fontSize: 12 }}>
                {level.character.emoji} {level.character.name} · {level.character.role}
              </div>
            </div>
          </div>

          {/* ── Character zone ── */}
          <div style={{
            padding: '28px 20px 14px',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
          }}>
            {/* Avatar with optional pulse rings when char is speaking */}
            <div style={{ position: 'relative', width: 90, height: 90, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {isCharSpeaking && <>
                <div className="pulse-ring" style={{ width: 90, height: 90 }} />
                <div className="pulse-ring" style={{ width: 90, height: 90, animationDelay: '0.6s', opacity: 0.5 }} />
              </>}
              <div style={{
                width: 80, height: 80, borderRadius: '50%',
                background: world.bg, border: `3px solid ${world.border}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 40, zIndex: 1,
              }}>
                {level.character.emoji}
              </div>
            </div>

            {/* Listening wave bars (while TTS plays) */}
            {isCharSpeaking && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, height: 50 }}>
                {WAVE_HEIGHTS.map((h, i) => (
                  <div
                    key={i}
                    className="wave-bar"
                    style={{ height: h, animationDelay: WAVE_DELAYS[i] }}
                  />
                ))}
              </div>
            )}

            {/* Character speech bubble */}
            <div style={{
              background: 'white', borderRadius: 20,
              padding: '14px 18px',
              maxWidth: 340, width: '100%',
              boxShadow: '0 2px 14px rgba(0,0,0,0.08)',
              border: '2px solid #E5E7EB',
            }}>
              <div style={{ fontSize: 12, color: '#6B7280', fontWeight: 700, marginBottom: 5, letterSpacing: 0.3 }}>
                {level.character.name.toUpperCase()} SAYS:
              </div>
              <div style={{ fontSize: 17, color: '#1F2937', lineHeight: 1.55 }}>
                {charResponse || level.opening}
              </div>
            </div>
          </div>

          {/* ── Player reply bubble ── */}
          {playerSpeech && !isProcessing && !isReadyToSpeak && !isCharSpeaking && (
            <div style={{ padding: '0 20px 10px', display: 'flex', justifyContent: 'flex-end' }}>
              <div style={{
                background: '#DBEAFE', borderRadius: 20,
                padding: '12px 16px', maxWidth: 280,
                border: '2px solid #93C5FD',
              }}>
                <div style={{ fontSize: 12, color: '#1D4ED8', fontWeight: 700, marginBottom: 4 }}>YOU SAID:</div>
                <div style={{ fontSize: 16, color: '#1E3A8A', lineHeight: 1.45 }}>{playerSpeech}</div>
              </div>
            </div>
          )}

          {/* ── Processing spinner ── */}
          {isProcessing && (
            <div style={{ textAlign: 'center', padding: '16px 0' }}>
              <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 8 }}>
                {[0,1,2].map(i => (
                  <div
                    key={i}
                    className="wave-bar"
                    style={{ height: 16, width: 10, animationDelay: `${i * 0.2}s` }}
                  />
                ))}
              </div>
              <div style={{ color: '#9CA3AF', fontSize: 14 }}>Thinking…</div>
              {apiError && (
                <div style={{ color: '#F87171', fontSize: 12, marginTop: 4 }}>
                  (API error — using offline feedback)
                </div>
              )}
            </div>
          )}

          <div style={{ flex: 1 }} />

          {/* ── Coach panel (slides up from bottom) ── */}
          {showCoachPanel && coaching && (
            <div
              className="slide-up"
              style={{
                background: 'white',
                borderTop: '4px solid #FCD34D',
                borderRadius: '26px 26px 0 0',
                padding: '22px 20px 36px',
                boxShadow: '0 -6px 24px rgba(0,0,0,0.12)',
              }}
            >
              {/* Stars row */}
              <div style={{ display: 'flex', justifyContent: 'center', gap: 10, marginBottom: 14 }}>
                {[1,2,3].map(s => (
                  <span
                    key={s}
                    className={s <= stars ? `star-${s}` : ''}
                    style={{
                      fontSize: 40,
                      filter: s <= stars ? 'none' : 'grayscale(1)',
                      opacity: s <= stars ? 1 : 0.25,
                    }}
                  >⭐</span>
                ))}
              </div>

              {/* Encouragement */}
              <div style={{ textAlign: 'center', fontSize: 18, fontWeight: 800, color: '#1F2937', marginBottom: 14 }}>
                {coaching.encouragement}
              </div>

              {/* Better phrase */}
              <div style={{
                background: '#F0FDF4', borderRadius: 16,
                padding: '12px 16px', marginBottom: 10,
                border: '2px solid #86EFAC',
              }}>
                <div style={{ fontSize: 12, color: '#16A34A', fontWeight: 700, marginBottom: 4, letterSpacing: 0.3 }}>
                  BETTER PHRASE:
                </div>
                <div style={{ fontSize: 19, fontWeight: 800, color: '#14532D', lineHeight: 1.4 }}>
                  {coaching.better_phrase}
                </div>
              </div>

              {/* Bengali translation */}
              <div style={{
                background: '#FEF3C7', borderRadius: 16,
                padding: '10px 14px', marginBottom: 18,
                border: '2px solid #FDE68A',
              }}>
                <div style={{ fontSize: 12, color: '#92400E', fontWeight: 700, marginBottom: 3, letterSpacing: 0.3 }}>
                  বাংলা:
                </div>
                <div style={{ fontSize: 16, color: '#78350F', lineHeight: 1.55 }}>
                  {coaching.bengali_translation}
                </div>
              </div>

              {/* Action button */}
              {isCoaching && (
                <button
                  onClick={handleSayItWithMe}
                  style={{
                    background: '#3B82F6', color: 'white',
                    fontSize: 19, fontWeight: 800,
                    borderRadius: 18, padding: '18px 0',
                    width: '100%', minHeight: 'unset',
                  }}
                >
                  🔊 &nbsp;Say it with me
                </button>
              )}
              {isReplay && (
                <button
                  onClick={handleContinue}
                  className="bounce-in"
                  style={{
                    background: '#F97316', color: 'white',
                    fontSize: 19, fontWeight: 800,
                    borderRadius: 18, padding: '18px 0',
                    width: '100%', minHeight: 'unset',
                  }}
                >
                  ✓ &nbsp;Continue
                </button>
              )}
            </div>
          )}

          {/* ── Mic area (shown when ready or recording) ── */}
          {(showMicArea || (isReadyToSpeak && showTextInput)) && (
            <div style={{
              padding: '16px 20px 44px',
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', gap: 14,
            }}>
              {!showTextInput ? (
                <>
                  <div style={{ fontSize: 13, color: '#6B7280', fontWeight: 700 }}>
                    {isRecording ? '🔴  Listening…' : 'Tap to speak'}
                  </div>

                  {/* Visual hint for target phrase */}
                  <div style={{ fontSize: 30, letterSpacing: 8 }}>{level.hint}</div>

                  {/* Big mic button */}
                  <button
                    className={isRecording ? 'mic-glow' : ''}
                    onMouseDown={startRecording}
                    onTouchStart={startRecording}
                    onMouseUp={stopRecording}
                    onTouchEnd={stopRecording}
                    onClick={isRecording ? stopRecording : startRecording}
                    style={{
                      width: 104, height: 104, borderRadius: '50%',
                      background: isRecording ? '#EF4444' : '#22C55E',
                      color: 'white', fontSize: 48,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      boxShadow: '0 6px 24px rgba(0,0,0,0.18)',
                      minHeight: 'unset', minWidth: 'unset',
                      transition: 'background 0.2s',
                    }}
                  >
                    {isRecording ? '⏹' : '🎤'}
                  </button>

                  {/* Fallback: switch to text */}
                  <button
                    onClick={() => setShowTextInput(true)}
                    style={{
                      background: 'none', color: '#9CA3AF',
                      fontSize: 14, minHeight: 'unset', minWidth: 'unset',
                      textDecoration: 'underline',
                    }}
                  >
                    ⌨️ type instead
                  </button>
                </>
              ) : (
                /* Text input fallback */
                <div style={{ width: '100%', maxWidth: 360, display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={{ textAlign: 'center', fontSize: 14, color: '#6B7280' }}>⌨️ Type your answer</div>
                  <div style={{ textAlign: 'center', fontSize: 30 }}>{level.hint}</div>
                  <input
                    autoFocus
                    value={textInput}
                    onChange={e => setTextInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && textInput.trim() && handlePlayerSpeech(textInput.trim())}
                    placeholder="Type here…"
                    style={{
                      fontSize: 18, padding: '14px 16px',
                      borderRadius: 14, border: '2px solid #E5E7EB', outline: 'none',
                    }}
                  />
                  <button
                    onClick={() => textInput.trim() && handlePlayerSpeech(textInput.trim())}
                    style={{
                      background: '#22C55E', color: 'white',
                      fontSize: 18, fontWeight: 800,
                      borderRadius: 16, padding: '16px 0', minHeight: 'unset',
                    }}
                  >
                    ✓ Submit
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    /* ──────────────────────────────────────────────────────
       SECTION D5: LEVEL COMPLETE SCREEN
    ────────────────────────────────────────────────────── */
    const LevelCompleteScreen = ({ worldIdx, levelIdx, stars, unlockedNewWorld, onContinue, onReplay }) => {
      const world = WORLDS[worldIdx];
      const level = world.levels[levelIdx];
      const [showUnlock, setShowUnlock] = useState(false);

      useEffect(() => {
        const msg = stars === 3
          ? `Amazing! Three stars! ${level.name} complete!`
          : stars === 2
          ? `Great job! ${level.name} complete!`
          : `Good try! You finished ${level.name}. Keep practicing!`;

        speak(msg, {
          rate: 0.8,
          onEnd: () => {
            if (unlockedNewWorld) {
              setShowUnlock(true);
              speak("You unlocked a new world!", { rate: 0.8 });
            }
          },
        });
        return () => stopSpeech();
      }, []);

      return (
        <div style={{
          minHeight: '100vh', background: '#FFFBF5',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          padding: 24, gap: 20,
        }}>
          <Confetti />

          <div className="bounce-in" style={{ fontSize: 78 }}>🎉</div>

          <div style={{ textAlign: 'center' }}>
            <h2 style={{ fontSize: 30, fontWeight: 900, color: '#1F2937' }}>Level Complete!</h2>
            <p style={{ color: '#6B7280', marginTop: 5, fontSize: 15 }}>{level.name}</p>
          </div>

          {/* Stars */}
          <div style={{ display: 'flex', gap: 12 }}>
            {[1,2,3].map(s => (
              <span
                key={s}
                className={s <= stars ? `star-${s}` : ''}
                style={{
                  fontSize: 56,
                  filter: s <= stars ? 'none' : 'grayscale(1)',
                  opacity: s <= stars ? 1 : 0.2,
                }}
              >⭐</span>
            ))}
          </div>

          {/* Phrase card */}
          <div style={{
            background: 'white', borderRadius: 22,
            padding: '18px 22px',
            width: '100%', maxWidth: 340,
            boxShadow: '0 4px 20px rgba(0,0,0,0.1)',
            border: '2px solid #E5E7EB',
          }}>
            <div style={{ fontSize: 12, color: '#6B7280', fontWeight: 700, marginBottom: 8, letterSpacing: 0.3 }}>
              TODAY'S PHRASE:
            </div>
            <div style={{ fontSize: 20, fontWeight: 800, color: '#1F2937', lineHeight: 1.4 }}>
              {level.targetPhrase}
            </div>
          </div>

          {/* World unlock banner */}
          {showUnlock && (
            <div
              className="bounce-in"
              style={{
                background: '#FCD34D', borderRadius: 18,
                padding: '14px 20px',
                width: '100%', maxWidth: 340,
                textAlign: 'center',
                animation: 'unlock-flash 0.6s ease 4, bounce-in 0.55s ease-out',
              }}
            >
              <div style={{ fontSize: 32 }}>🔓</div>
              <div style={{ fontSize: 17, fontWeight: 800, color: '#78350F' }}>
                New World Unlocked!
              </div>
            </div>
          )}

          {/* Action buttons */}
          <div style={{ width: '100%', maxWidth: 340, display: 'flex', gap: 12 }}>
            <button
              onClick={onReplay}
              style={{
                flex: 1,
                background: '#F3F4F6', color: '#374151',
                fontSize: 16, fontWeight: 700,
                borderRadius: 16, padding: '16px 0', minHeight: 'unset',
              }}
            >🔁 Again</button>
            <button
              onClick={onContinue}
              style={{
                flex: 2,
                background: '#F97316', color: 'white',
                fontSize: 18, fontWeight: 800,
                borderRadius: 16, padding: '16px 0', minHeight: 'unset',
              }}
            >→ Continue</button>
          </div>
        </div>
      );
    };

    /* ──────────────────────────────────────────────────────
       SECTION E: ROOT APP — STATE MACHINE + NAVIGATION
    ────────────────────────────────────────────────────── */
    const App = () => {
      const [apiKey,         setApiKey]         = useState('');
      const [screen,         setScreen]         = useState('setup');
      const [selectedWorld,  setSelectedWorld]  = useState(null);
      const [selectedLevel,  setSelectedLevel]  = useState(null);
      const [unlockedWorlds, setUnlockedWorlds] = useState([true, false, false, false]);
      const [completedLevels, setCompletedLevels] = useState({
        0: new Set(), 1: new Set(), 2: new Set(), 3: new Set(),
      });
      const [lastStars,         setLastStars]         = useState(0);
      const [unlockedNewWorld,  setUnlockedNewWorld]  = useState(false);
      // key to force ConversationScreen remount on replay
      const [convKey, setConvKey] = useState(0);

      const handleSetup = key => { setApiKey(key); setScreen('world'); };

      const handleWorldSelect = i => { setSelectedWorld(i); setScreen('level'); };

      const handleLevelSelect = i => { setSelectedLevel(i); setScreen('conversation'); };

      const handleConversationComplete = stars => {
        setLastStars(stars);

        // Mark level complete
        const updated = {
          ...completedLevels,
          [selectedWorld]: new Set(completedLevels[selectedWorld]),
        };
        updated[selectedWorld].add(selectedLevel);
        setCompletedLevels(updated);

        // Check if all 3 levels done → unlock next world
        let didUnlock = false;
        if (updated[selectedWorld].size === 3 && selectedWorld < 3) {
          const newUnlocked = [...unlockedWorlds];
          if (!newUnlocked[selectedWorld + 1]) {
            newUnlocked[selectedWorld + 1] = true;
            setUnlockedWorlds(newUnlocked);
            didUnlock = true;
          }
        }
        setUnlockedNewWorld(didUnlock);
        setScreen('complete');
      };

      const handleContinue = () => setScreen('level');

      const handleReplay = () => {
        setConvKey(k => k + 1);   // remount ConversationScreen
        setScreen('conversation');
      };

      if (screen === 'setup') return <SetupScreen onSetup={handleSetup} />;

      if (screen === 'world') return (
        <WorldSelectScreen
          unlockedWorlds={unlockedWorlds}
          completedLevels={completedLevels}
          onSelect={handleWorldSelect}
        />
      );

      if (screen === 'level') return (
        <LevelSelectScreen
          worldIdx={selectedWorld}
          completedLevels={completedLevels}
          onSelect={handleLevelSelect}
          onBack={() => setScreen('world')}
        />
      );

      if (screen === 'conversation') return (
        <ConversationScreen
          key={convKey}
          worldIdx={selectedWorld}
          levelIdx={selectedLevel}
          apiKey={apiKey}
          onComplete={handleConversationComplete}
          onBack={() => setScreen('level')}
        />
      );

      if (screen === 'complete') return (
        <LevelCompleteScreen
          worldIdx={selectedWorld}
          levelIdx={selectedLevel}
          stars={lastStars}
          unlockedNewWorld={unlockedNewWorld}
          onContinue={handleContinue}
          onReplay={handleReplay}
        />
      );

      return null;
    };

    /* ── Mount ── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
